version = 1

[*]
fit = off
n-gpu-layers = 999
sleep-idle-seconds = 300
ctx-size = 32768
temp = 1.0
top-p = 1.0
top-k = 40
min-p = 0.0
min-p = 0.0
repeat-penalty = 1.0 ; never turn this on
presence-penalty = 0.0
frequency-penalty = 0.0

[default]
load-on-startup = 1
ctx-size = 21504
model = /somewhere/general/qwen/qwen3-4b-instruct-2507-heretic-av2.q8_0.gguf

[qwenq5]
;load-on-startup = 1
ctx-size = 29696
model = /somewhere/general/qwen/qwen3-4b-instruct-2507-heretic-av2.i1-q5_k_m.gguf

[qwenmini]
model = /somewhere/general/qwen/qwen3-1.7b.q8_0.gguf
reasoning-budget = 0

[gemma]
model = /somewhere/general/gemma/gemma-3n-e4b-it-absolute-heresy-q4_k_m.gguf
mmproj = /somewhere/vl/mmproj-gemma-3n-e4b-it-absolute-heresy-f16.gguf

[gemma-qat]
model = /somewhere/general/gemma/gemma-3-4b-it-q4_0_s.gguf
mmproj = /somewhere/vl/mmproj-google_gemma-3-4b-it-f16.gguf
override-kv = gemma3.attention.sliding_window=int:512
ctx-size = 131072

[qwencoder]
model = /somewhere/coder/qwen2.5-coder-1.5b-q8_0.gguf